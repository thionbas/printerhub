<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AP PRINTER SYSTEM</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
    <link rel="stylesheet" href="style.css">
</head>
<body class="bg-gray-100 text-gray-900 font-sans min-h-screen">

    <header class="bg-[#064e3b] p-4 shadow-md sticky top-0 z-50">
        <div class="max-w-7xl mx-auto flex justify-between items-center">
            <h1 id="appTitle" class="text-xl font-black text-white tracking-widest uppercase">AP PRINTER HUB</h1>
            <button id="backToHub" class="hidden text-white border border-white px-4 py-1 rounded hover:bg-white hover:text-[#064e3b] transition font-bold text-xs">
                ← ZURÜCK
            </button>
        </div>
    </header>

    <main class="max-w-7xl mx-auto p-4 mt-4">
        <section id="hubSection" class="grid grid-cols-2 md:grid-cols-4 gap-4 animate-fadeIn"></section>

        <section id="appSection" class="hidden grid grid-cols-1 lg:grid-cols-2 gap-8 animate-fadeIn">
            <div class="bg-white p-6 rounded-xl shadow-lg border border-gray-200 h-fit space-y-6">
                <div id="dynamicFields" class="space-y-4"></div>
                <div id="ghsArea" class="hidden"><label class="text-[10px] font-bold text-gray-400 uppercase">GHS Symbole</label><div id="ghsPicker" class="grid grid-cols-5 gap-2 mt-1"></div></div>
                <div id="batchArea" class="hidden grid grid-cols-2 gap-4 p-3 bg-gray-50 rounded border">
                    <div><label class="text-[10px] font-bold text-gray-400 uppercase">Start (1-12)</label><input type="number" id="startPos" value="1" min="1" max="12" class="w-full p-1 border rounded"></div>
                    <div><label class="text-[10px] font-bold text-gray-400 uppercase">Anzahl</label><input type="number" id="printCount" value="12" min="1" max="12" class="w-full p-1 border rounded"></div>
                </div>
                <button id="pdfBtn" class="w-full bg-[#064e3b] text-white py-4 rounded-lg font-black text-xl hover:bg-green-800 transition-all uppercase tracking-widest">PDF Drucken</button>
            </div>

            <div class="flex flex-col items-center">
                <div id="previewContainer" class="preview-box shadow-2xl"></div>
                <p id="formatInfo" class="mt-4 text-[10px] text-gray-400 font-bold uppercase"></p>
            </div>
        </section>
    </main>
    <script src="script.js"></script>
</body>
</html>
